<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cosmic Zen Sandbox</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #020617;
    width: 100%;
    height: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #zenCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .glass-panel {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .ctrl-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.2s ease;
  }
  .ctrl-btn:hover {
    background: rgba(255, 255, 255, 0.16);
    transform: translateY(-1px);
  }
  .ctrl-btn:active {
    transform: scale(0.95);
  }
  .ctrl-btn.active-on {
    background: rgba(56, 189, 248, 0.25);
    border-color: rgba(56, 189, 248, 0.5);
    box-shadow: 0 0 16px rgba(56, 189, 248, 0.25);
  }
  .palette-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .palette-dot:hover {
    transform: scale(1.15);
  }
  .palette-dot.selected {
    border-color: white;
    box-shadow: 0 0 10px currentColor;
  }
  .fade-in-up {
    animation: fadeInUp 0.7s ease forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hint-pulse {
    animation: hintPulse 2.4s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.9; }
  }
  select.theme-select {
    background-color: rgba(15, 23, 42, 0.9);
    color: #e2e8f0;
  }
</style>
</head>
<body class="bg-slate-950">

<canvas id="zenCanvas"></canvas>

<div class="absolute top-6 left-1/2 -translate-x-1/2 text-center pointer-events-none select-none fade-in-up" id="hintText">
  <p class="text-slate-300 text-sm sm:text-base font-light tracking-wide hint-pulse">Sentuh atau klik di mana saja untuk melahirkan partikel cahaya</p>
</div>

<div class="fixed bottom-0 left-0 w-full flex justify-center pb-5 sm:pb-8 px-4 pointer-events-none">
  <div class="glass-panel pointer-events-auto rounded-2xl sm:rounded-full px-4 sm:px-6 py-3 flex flex-col sm:flex-row items-center gap-3 sm:gap-5 shadow-2xl fade-in-up max-w-[95vw]">

    <button id="resetBtn" class="ctrl-btn rounded-full w-11 h-11 flex items-center justify-center text-slate-200 shrink-0" title="Hapus semua partikel">
      <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
    </button>

    <div class="hidden sm:block w-px h-7 bg-white/15"></div>

    <div class="flex items-center gap-2.5">
      <i data-lucide="palette" class="w-4 h-4 text-slate-300"></i>
      <div id="paletteDots" class="flex items-center gap-2"></div>
    </div>

    <div class="hidden sm:block w-px h-7 bg-white/15"></div>

    <button id="frictionBtn" class="ctrl-btn rounded-full px-4 h-11 flex items-center gap-2 text-slate-200 text-sm font-medium shrink-0" title="Aktifkan/matikan hambatan gravitasi">
      <i data-lucide="magnet" class="w-4 h-4"></i>
      <span id="frictionLabel">Orbit Abadi</span>
    </button>

  </div>
</div>

<div class="fixed top-6 right-6 text-slate-500 text-xs font-light tracking-widest hidden sm:block fade-in-up select-none pointer-events-none">
  COSMIC ZEN SANDBOX
</div>

<script>
lucide.createIcons();

const canvas = document.getElementById('zenCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let W, H, centerX, centerY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2;
}
window.addEventListener('resize', resize);
resize();

const THEMES = {
  aurora: { name: 'Aurora Green', colors: ['#34d399', '#5eead4', '#a7f3d0', '#10b981'], core: '#34d399', hex: '#34d399' },
  cosmic: { name: 'Cosmic Purple', colors: ['#a78bfa', '#c4b5fd', '#818cf8', '#7c3aed'], core: '#a78bfa', hex: '#a78bfa' },
  nebula: { name: 'Nebula Pink', colors: ['#f472b6', '#fb7185', '#f9a8d4', '#ec4899'], core: '#f472b6', hex: '#f472b6' },
  solar:  { name: 'Solar Amber', colors: ['#fbbf24', '#fcd34d', '#fb923c', '#f59e0b'], core: '#fbbf24', hex: '#fbbf24' }
};
let currentTheme = 'aurora';

const paletteContainer = document.getElementById('paletteDots');
Object.keys(THEMES).forEach((key) => {
  const dot = document.createElement('div');
  dot.className = 'palette-dot' + (key === currentTheme ? ' selected' : '');
  dot.style.backgroundColor = THEMES[key].hex;
  dot.style.color = THEMES[key].hex;
  dot.title = THEMES[key].name;
  dot.dataset.theme = key;
  dot.addEventListener('click', () => {
    currentTheme = key;
    document.querySelectorAll('.palette-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
  });
  paletteContainer.appendChild(dot);
});

let frictionEnabled = false;
const frictionBtn = document.getElementById('frictionBtn');
const frictionLabel = document.getElementById('frictionLabel');
frictionBtn.addEventListener('click', () => {
  frictionEnabled = !frictionEnabled;
  frictionBtn.classList.toggle('active-on', frictionEnabled);
  frictionLabel.textContent = frictionEnabled ? 'Tersedot Inti' : 'Orbit Abadi';
});

const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  particles.length = 0;
});

const hintText = document.getElementById('hintText');
let hintHidden = false;

const CORE_RADIUS = 14;
const GRAVITY_STRENGTH = 1400;
const MAX_PARTICLES = 600;
const FRICTION_FACTOR = 0.991;

let particles = [];

class Particle {
  constructor(x, y, theme) {
    this.x = x;
    this.y = y;
    const angleToCenter = Math.atan2(centerY - y, centerX - x);
    const orbitAngle = angleToCenter + Math.PI / 2 * (Math.random() < 0.5 ? 1 : -1);
    const dist = Math.hypot(centerX - x, centerY - y) || 1;
    const baseSpeed = Math.sqrt(GRAVITY_STRENGTH / Math.max(dist, 40)) * (0.7 + Math.random() * 0.5);
    this.vx = Math.cos(orbitAngle) * baseSpeed + (Math.random() - 0.5) * 0.6;
    this.vy = Math.sin(orbitAngle) * baseSpeed + (Math.random() - 0.5) * 0.6;
    this.radius = 1.2 + Math.random() * 2.0;
    const palette = THEMES[theme].colors;
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.life = 1;
    this.decay = 0.0006 + Math.random() * 0.0008;
  }

  update(dt) {
    const dx = centerX - this.x;
    const dy = centerY - this.y;
    const distSq = dx * dx + dy * dy;
    const dist = Math.sqrt(distSq) || 1;

    const forceMag = GRAVITY_STRENGTH / Math.max(distSq, 900);
    const ax = (dx / dist) * forceMag;
    const ay = (dy / dist) * forceMag;

    this.vx += ax * dt;
    this.vy += ay * dt;

    if (frictionEnabled) {
      this.vx *= FRICTION_FACTOR;
      this.vy *= FRICTION_FACTOR;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    if (dist < CORE_RADIUS + this.radius) {
      this.life = 0;
    }

    this.life -= this.decay * dt;
  }

  draw(ctx) {
    const alpha = Math.max(this.life, 0);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function spawnBurst(x, y) {
  if (!hintHidden) {
    hintHidden = true;
    hintText.style.transition = 'opacity 0.6s ease';
    hintText.style.opacity = '0';
  }
  const count = 22 + Math.floor(Math.random() * 14);
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) {
      particles.shift();
    }
    const offsetX = x + (Math.random() - 0.5) * 18;
    const offsetY = y + (Math.random() - 0.5) * 18;
    particles.push(new Particle(offsetX, offsetY, currentTheme));
  }
}

function getEventPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

let isPointerDown = false;
let lastSpawnTime = 0;
const SPAWN_INTERVAL = 60;

canvas.addEventListener('mousedown', (e) => {
  isPointerDown = true;
  const pos = getEventPos(e);
  spawnBurst(pos.x, pos.y);
  lastSpawnTime = performance.now();
});
canvas.addEventListener('mousemove', (e) => {
  if (!isPointerDown) return;
  const now = performance.now();
  if (now - lastSpawnTime > SPAWN_INTERVAL) {
    const pos = getEventPos(e);
    spawnBurst(pos.x, pos.y);
    lastSpawnTime = now;
  }
});
window.addEventListener('mouseup', () => { isPointerDown = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  isPointerDown = true;
  const pos = getEventPos(e);
  spawnBurst(pos.x, pos.y);
  lastSpawnTime = performance.now();
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isPointerDown) return;
  const now = performance.now();
  if (now - lastSpawnTime > SPAWN_INTERVAL) {
    const pos = getEventPos(e);
    spawnBurst(pos.x, pos.y);
    lastSpawnTime = now;
  }
}, { passive: false });
window.addEventListener('touchend', () => { isPointerDown = false; });

let corePulse = 0;

function drawCore() {
  corePulse += 0.02;
  const pulseFactor = 1 + Math.sin(corePulse) * 0.08;
  const r = CORE_RADIUS * pulseFactor;
  const theme = THEMES[currentTheme];

  const outerGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r * 9);
  outerGlow.addColorStop(0, theme.core + 'aa');
  outerGlow.addColorStop(0.3, theme.core + '33');
  outerGlow.addColorStop(1, theme.core + '00');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(centerX, centerY, r * 9, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = theme.core;
  ctx.shadowBlur = 30;
  ctx.fill();
  ctx.shadowBlur = 0;
}

let lastTime = performance.now();

function animate(now) {
  const dtRaw = (now - lastTime) / 16.6667;
  const dt = Math.min(dtRaw, 2.5);
  lastTime = now;

  ctx.fillStyle = 'rgba(2, 6, 23, 0.18)';
  ctx.fillRect(0, 0, W, H);

  drawCore();

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update(dt);
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    p.draw(ctx);
  }

  requestAnimationFrame(animate);
}

ctx.fillStyle = '#020617';
ctx.fillRect(0, 0, W, H);
requestAnimationFrame(animate);
</script>
</body>
</html>
