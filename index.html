<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorigu Studio | Jasa Pembuatan Website Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Animasi subtle untuk background */
        .bg-gradient-animate {
            background-size: 200% 200%;
            animation: gradientMove 8s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Ornamen Background -->
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Main Card (Glassmorphism) -->
    <div class="w-full max-w-sm bg-slate-900/60 backdrop-blur-xl rounded-3xl shadow-2xl border border-slate-700/50 p-8 relative z-10">
        
        <!-- Header & Profile -->
        <div class="text-center mb-8">
            <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-indigo-500 to-emerald-400 rounded-full p-1 mb-4 shadow-lg">
                <div class="w-full h-full bg-slate-900 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-code text-3xl text-slate-200"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Gorigu Studio</h1>
            <p class="text-indigo-400 font-medium text-sm mt-1">Modern Web Development</p>
        </div>

        <!-- Copywriting Section -->
        <div class="text-center mb-8 space-y-3">
            <p class="text-slate-300 text-sm leading-relaxed">
                Hadirkan bisnis Anda ke dunia digital dengan website yang <strong class="text-white">Cepat, Aman, dan Elegan.</strong>
            </p>
            <div class="inline-block bg-slate-800/80 rounded-lg px-4 py-2 text-xs text-slate-400 border border-slate-700/50">
                <i class="fa-solid fa-server mr-1"></i> Mendukung Arsitektur <span class="text-emerald-400 font-semibold">Serverless</span> & <span class="text-emerald-400 font-semibold">VPS</span>
            </div>
        </div>

        <!-- Action Buttons (CTA) -->
        <div class="space-y-4 mb-8">
            <!-- Tombol WA -->
            <a href="https://wa.me/6285713697219?text=Halo%2C%20saya%20tertarik%20untuk%20membuat%20website..." target="_blank" class="flex items-center justify-center w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-emerald-900/50">
                <i class="fa-brands fa-whatsapp text-xl mr-2"></i>
                Konsultasi via WhatsApp
            </a>
            
            <!-- Tombol IG -->
            <a href="https://instagram.com/khsatrya" target="_blank" class="flex items-center justify-center w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-purple-900/50">
                <i class="fa-brands fa-instagram text-xl mr-2"></i>
                @khsatrya
            </a>
        </div>

        <!-- Footer / Address -->
        <div class="pt-6 border-t border-slate-700/50 text-center">
            <div class="flex items-start justify-center text-slate-400 text-xs">
                <i class="fa-solid fa-location-dot mt-1 mr-2 text-rose-500"></i>
                <p class="text-left leading-relaxed">
                    Windan RT 02 RW 6,<br>
                    Gumpang, Kartasura
                </p>
            </div>
        </div>

    </div>

</body>
</html>
